version: "3.9"

services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: proxy-backend
    environment:
      WEBHOOK_TOKEN: ${WEBHOOK_TOKEN:-changeme}
      DASHSCOPE_API_KEY: ${DASHSCOPE_API_KEY:-}
      DATABASE_URL: ${DATABASE_URL:-}
    ports:
      - "8000:8000"
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: proxy-frontend
    environment:
      VITE_API_URL: ${VITE_API_URL:-http://localhost:8000}
      VITE_API_PROXY_TARGET: ${VITE_API_PROXY_TARGET:-http://backend:8000}
      VITE_WEBHOOK_TOKEN: ${VITE_WEBHOOK_TOKEN:-changeme}
    ports:
      - "3000:3000"
    depends_on:
      - backend
    restart: unless-stopped
